name: Orchestrator

on:
  workflow_dispatch:
  repository_dispatch:
    types: [orchestrator-turn]

permissions:
  contents: read

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get last speaker
        id: last
        run: |
          if [ -s chat/conversation.md ]; then
            last=$(grep -E '^[A-Za-z]+:' chat/conversation.md | tail -n 1 | sed 's/:.*//')
          else
            last=""
          fi
          echo "last=$last" >> $GITHUB_OUTPUT

      - name: Decide next
        id: decide
        run: |
          next=$(python scripts/orchestrator.py "${{ steps.last.outputs.last }}")
          echo "next=$next" >> $GITHUB_OUTPUT

      - name: Dispatch next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d '{"event_type":"'${{ steps.decide.outputs.next }}'"}'
