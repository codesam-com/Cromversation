name: Personality C (Cyra)

on:
  repository_dispatch:
    types: [cyra-turn]

permissions:
  contents: write
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: cromversation
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check turn
        id: turn
        run: |
          set +e
          python scripts/append_turn.py --chat-file chat/conversation.md --speaker Cyra --starter Aurora --check-only
          echo "code=$?" >> $GITHUB_OUTPUT

      - name: Skip if not turn
        if: steps.turn.outputs.code == '3'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d '{"event_type":"orchestrator-turn"}'

      - name: Stop after skip
        if: steps.turn.outputs.code == '3'
        run: exit 0

      - name: Fail on error
        if: steps.turn.outputs.code != '0'
        run: exit 1

      - name: Build request
        run: |
          bash scripts/run_build.sh \
            --persona-file personas/personality_c.md \
            --chat-file chat/conversation.md \
            --speaker Cyra \
            --other-speaker Aurora \
            --model openai/gpt-4.1 \
            --output request.json

      - name: Call model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s https://models.github.ai/inference/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d @request.json > response.json
          if [ ! -s response.json ]; then exit 1; fi

      - name: Extract message
        run: jq -r '.choices[0].message.content' response.json > response.txt

      - name: Append turn
        run: |
          bash scripts/run_append.sh \
            --chat-file chat/conversation.md \
            --speaker Cyra \
            --starter Aurora \
            --message-file response.txt

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add chat/conversation.md
          git commit -m "chat: Cyra turn" || exit 0
          git push

      - name: Back to orchestrator (retry)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            curl -s -X POST https://api.github.com/repos/${{ github.repository }}/dispatches \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -d '{"event_type":"orchestrator-turn"}' && break
            sleep 2
          done
