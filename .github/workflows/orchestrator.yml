name: Orchestrator

on:
  workflow_dispatch:
  repository_dispatch:
    types: [orchestrator-turn]

permissions:
  contents: write

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get last speaker
        id: last
        run: |
          if [ -s chat/conversation.md ]; then
            last=$(grep -E '^[A-Za-z]+:' chat/conversation.md | tail -n 1 | sed 's/:.*//')
          else
            last=""
          fi
          echo "last=$last" >> $GITHUB_OUTPUT

      - name: Decide next
        id: decide
        run: |
          next=$(python scripts/orchestrator.py "${{ steps.last.outputs.last }}")
          echo "next=$next"
          echo "next=$next" >> $GITHUB_OUTPUT

      - name: Dispatch next (reliable)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            echo "Dispatch attempt $i: ${{ steps.decide.outputs.next }}"
            curl --fail --silent --show-error \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/dispatches \
              -d '{"event_type":"'${{ steps.decide.outputs.next }}'"}' && break
            sleep 2
          done
