name: Personality C (Cyra)

on:
  repository_dispatch:
    types: [cyra-turn]

permissions:
  contents: write
  models: read

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: cromversation
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Wait before model call
        run: sleep 45

      - name: Build request
        run: |
          bash scripts/run_build.sh \
            --persona-file personas/personality_c.md \
            --chat-file chat/conversation.md \
            --speaker Cyra \
            --other-speaker Aurora \
            --model microsoft/phi-4-mini-instruct \
            --output request.json

      - name: Call model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s https://models.github.ai/inference/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d @request.json > response.json
          if [ ! -s response.json ]; then echo "fallback" > response.txt; exit 0; fi

      - name: Extract message
        run: |
          bash scripts/extract_chat_message.sh response.json response.txt Cyra

      - name: Append turn
        run: |
          bash scripts/run_append.sh \
            --chat-file chat/conversation.md \
            --speaker Cyra \
            --message-file response.txt

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"
          git add chat/conversation.md
          git commit -m "chat: Cyra turn" || exit 0
          git push

      - name: Back to orchestrator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"orchestrator-turn"}'
