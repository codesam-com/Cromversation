name: Orchestrator

on:
  workflow_dispatch:
  repository_dispatch:
    types: [orchestrator-turn]

permissions:
  contents: write
  models: read

jobs:
  decide:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build orchestrator request
        id: build
        run: |
          python scripts/orchestrator.py build \
            --chat-file chat/conversation.md \
            --model openai/gpt-4.1 \
            --output request.json

      - name: Detect empty case
        id: empty
        run: |
          if grep -q '"empty": true' request.json; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Handle empty (skip model)
        if: steps.empty.outputs.empty == 'true'
        run: |
          python scripts/orchestrator.py extract \
            --response-file request.json \
            --output next.txt

      - name: Call model
        if: steps.empty.outputs.empty != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            -X POST https://models.github.ai/inference/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d @request.json > response.json

      - name: Extract decision
        if: steps.empty.outputs.empty != 'true'
        run: |
          python scripts/orchestrator.py extract \
            --response-file response.json \
            --output next.txt

      - name: Wait before dispatch
        run: sleep 45

      - name: Dispatch next
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          next=$(cat next.txt)
          echo "Dispatching: $next"
          curl --fail --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"'$next'"}'
